services:
  - type: web
    name: critiq-backend
    runtime: node
    buildCommand: cd critiq-backend && npm install
    startCommand: cd critiq-backend && node server.js
    envVars:
      - key: PORT
        value: 10000
      - key: TMDB_API_KEY
        sync: false
      - key: TMDB_ACCESS_TOKEN
        sync: false
      - key: OPENAI_API_KEY
        sync: false

  - type: static
    name: critiq-frontend
    buildCommand: cd critiq-frontend && npm install && npm run build
    staticPublishPath: critiq-frontend/dist
    envVars:
      - key: VITE_API_URL
        sync: false
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
