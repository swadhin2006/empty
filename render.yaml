services:
  # Backend API
  - type: web
    name: critiq-backend
    runtime: node
    rootDir: critiq-backend
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: PORT
        value: 5000
      - key: TMDB_API_KEY
        sync: false
      - key: TMDB_ACCESS_TOKEN
        sync: false
      - key: OPENAI_API_KEY
        sync: false

  # Frontend
  - type: web
    name: critiq-frontend
    runtime: static
    rootDir: critiq-frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        fromService:
          name: critiq-backend
          type: web
          property: host
    routes:
      - type: rewrite
        source: /api/*
        destination: https://critiq-backend.onrender.com/api/*
      - type: rewrite
        source: /*
        destination: /index.html
