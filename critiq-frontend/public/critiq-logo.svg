<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 120" width="400" height="120">
  <defs>
    <linearGradient id="redGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#e50914;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ff6b6b;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="filmGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#16213e;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background pill -->
  <rect x="0" y="0" width="400" height="120" rx="16" fill="url(#filmGrad)" />

  <!-- Film strip left decoration -->
  <rect x="10" y="10" width="22" height="100" rx="4" fill="#111" stroke="#333" stroke-width="1"/>
  <rect x="13" y="16" width="16" height="12" rx="2" fill="#e50914" opacity="0.8"/>
  <rect x="13" y="34" width="16" height="12" rx="2" fill="#e50914" opacity="0.6"/>
  <rect x="13" y="52" width="16" height="12" rx="2" fill="#e50914" opacity="0.8"/>
  <rect x="13" y="70" width="16" height="12" rx="2" fill="#e50914" opacity="0.6"/>
  <rect x="13" y="88" width="16" height="12" rx="2" fill="#e50914" opacity="0.8"/>

  <!-- Film strip right decoration -->
  <rect x="368" y="10" width="22" height="100" rx="4" fill="#111" stroke="#333" stroke-width="1"/>
  <rect x="371" y="16" width="16" height="12" rx="2" fill="#e50914" opacity="0.8"/>
  <rect x="371" y="34" width="16" height="12" rx="2" fill="#e50914" opacity="0.6"/>
  <rect x="371" y="52" width="16" height="12" rx="2" fill="#e50914" opacity="0.8"/>
  <rect x="371" y="70" width="16" height="12" rx="2" fill="#e50914" opacity="0.6"/>
  <rect x="371" y="88" width="16" height="12" rx="2" fill="#e50914" opacity="0.8"/>

  <!-- CRITIQ text -->
  <text x="200" y="72" font-family="'Arial Black', 'Impact', sans-serif" font-size="58" font-weight="900"
    fill="url(#redGrad)" text-anchor="middle" letter-spacing="8">CRITIQ</text>

  <!-- Underline accent -->
  <rect x="90" y="82" width="220" height="4" rx="2" fill="url(#redGrad)" opacity="0.7"/>

  <!-- Tagline -->
  <text x="200" y="105" font-family="Arial, sans-serif" font-size="13" fill="#aaaaaa"
    text-anchor="middle" letter-spacing="3">EXPERIENCE MOVIES</text>
</svg>
